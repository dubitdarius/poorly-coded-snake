<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poorly Coded Snake | Darius Dubit</title>
    <style>
        body {
            background-color: #006400;
            color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        #ui {
            height: 60px;
            width: 100%;
            background-color: #006400;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid #1e293b;
            z-index: 20;
        }

        .stat { color: #F5F5DC; }
        #score { color: #F5F5DC; }
        #highScore { color: #C7C7AD; }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            border: 2px solid #334155;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            overflow: hidden;
        }

        canvas {
            background-color: #061a06;
            position: absolute;
            top: 60px; /* UI border fix */
            left: 50%;
            transform: translateX(-50%);
            display: block;
            z-index: 10;
        }

        #pauseOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: 900;
            color: white;
            z-index: 30;
            display: none;
            background: rgba(0,0,0,0.7);
            padding: 40px 80px;
            border-radius: 15px;
            border: 2px solid #C7C7AD;
            pointer-events: none;
            letter-spacing: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="stat">SCORE: <span id="score">0</span></div>
    <div class="stat">BEST: <span id="highScore">0</span></div>
    <div class="color-picker-container">
        <span class="stat">SNAKE COLOR:</span>
        <input type="color" id="snakeColor" value="#E3BE05">
    </div>
</div>

<div id="pauseOverlay">PAUSED</div>
<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");
    const colorPicker = document.getElementById("snakeColor");
    const pauseOverlay = document.getElementById("pauseOverlay");

    const gridSize = 30;
    const uiHeight = 60;
    let snake, food, dx, dy, score, highScore, gameLoop, isPlaying, isPaused = false;
    let snakeColor = colorPicker.value;

    highScore = localStorage.getItem("snakeHighScore") || 0;
    highScoreElement.innerText = highScore;

    function resizeCanvas() {
        // Fix: Snapping canvas size to be exactly a multiple of gridSize
        canvas.width = Math.floor(window.innerWidth / gridSize) * gridSize;
        canvas.height = Math.floor((window.innerHeight - uiHeight) / gridSize) * gridSize;

        if(isPlaying) resetGame();
    }

    function randomFood() {
        // Fix: Use snapped dimensions to ensure food is always within reach
        const cols = canvas.width / gridSize;
        const rows = canvas.height / gridSize;
        food = {
            x: Math.floor(Math.random() * cols) * gridSize,
            y: Math.floor(Math.random() * rows) * gridSize
        };
    }

    function togglePause(show) {
        isPaused = show;
        pauseOverlay.style.display = show ? "block" : "none";
    }

    function drawGame() {
        if (isPaused) return;

        ctx.fillStyle = "#654321";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fb7185";
        ctx.fillRect(food.x, food.y, gridSize, gridSize);

        const head = { x: snake[0].x + dx, y: snake[0].y + dy };

        // Wall collision check
        if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
            resetGame();
            return;
        }

        // Self collision check
        for (let i = 0; i < snake.length; i++) {
            if (head.x === snake[i].x && head.y === snake[i].y) {
                resetGame();
                return;
            }
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            scoreElement.innerText = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("snakeHighScore", highScore);
                highScoreElement.innerText = highScore;
            }
            randomFood();
        } else {
            snake.pop();
        }

        ctx.fillStyle = snakeColor;
        snake.forEach((part, index) => {
            ctx.fillRect(part.x, part.y, gridSize, gridSize);
            ctx.strokeStyle = "#654321";
            ctx.strokeRect(part.x, part.y, gridSize, gridSize);
        });
    }

    function resetGame() {
        if(score > 0) alert("Game Over! Score: " + score);

        snake = [{
            x: Math.floor((canvas.width / gridSize) / 2) * gridSize,
            y: 0
        }];

        dx = 0;
        dy = gridSize;
        score = 0;
        scoreElement.innerText = score;
        isPlaying = false;
        randomFood();
    }

    colorPicker.addEventListener("click", () => togglePause(true));
    colorPicker.addEventListener("input", (e) => {
        snakeColor = e.target.value;
        scoreElement.style.color = snakeColor;
    });
    colorPicker.addEventListener("blur", () => togglePause(false));

    window.addEventListener("blur", () => {
        if(isPlaying) togglePause(true);
    });
    window.addEventListener("focus", () => {
        if(isPaused && isPlaying) togglePause(false);
    });

    document.addEventListener("keydown", (e) => {
        if (isPaused) togglePause(false);
        if (!isPlaying) isPlaying = true;
        if (e.key === "ArrowUp" && dy === 0) { dx = 0; dy = -gridSize; }
        if (e.key === "ArrowDown" && dy === 0) { dx = 0; dy = gridSize; }
        if (e.key === "ArrowLeft" && dx === 0) { dx = -gridSize; dy = 0; }
        if (e.key === "ArrowRight" && dx === 0) { dx = gridSize; dy = 0; }
    });

    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
    resetGame();
    gameLoop = setInterval(drawGame, 100);
</script>
</body>
</html>
